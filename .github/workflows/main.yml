name: "Deploy NewsWebAPP on github pages."

on: 
  push:
    #branch name
    branches: [ "master" ]
    

jobs:
 build:
   runs-on: ubuntu-latest
   
   name: Code base 
   permissions: 
     pages: write
     contents: write
   defaults:
    run:
      working-directory: Projects/NewsApp_WebAPI/FrontEnd
   steps:
     - name: Checkout 
       uses: actions/checkout@v4
       
     - name: Use Node.js 
       uses: actions/setup-node@v6
       with:
          check-latest: true
          node-version: 24
          cache: npm
          cache-dependency-path: Projects/NewsApp_WebAPI/FrontEnd/package-lock.json
          


     - name: Install dependencies
       run: npm ci
       

     - name: Execute build command :build project
       run: npm run build 
      
       
     - name: Deploy with gh-pages
       run: |
          git remote set-url origin https://git:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          npm run deploy -- -u "github-actions-bot <support+actions@github.com>"
      
       env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
   
   
    
    
    
  
  

